<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Успішна оплата</title>
    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 30px;
        border: 2px solid #00ff66;
        border-radius: 10px;
        background: #1a1a1a;
        box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
      }
      h1 {
        color: #00ff66;
      }
      p {
        font-size: 18px;
        color: #b3b3b3;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #00ff66;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="status-title">Перевіряємо оплату...</h1>
      <div id="loader" class="loader"></div>
      <p id="status-text">
        Будь ласка, не закривай сторінку. Ми підтверджуємо твій платіж у PayPal
        через бекенд.
      </p>
      <p>
        <a id="profile-link" href="profile.html" style="display: none; color: #00ff66">
          👤 Перейти в профіль зараз
        </a>
      </p>
    </div>

    <script>
      // Витягуємо параметри, які PayPal сам додає після підтвердження
      const urlParams = new URLSearchParams(window.location.search);
      const paypalOrderId = urlParams.get("token"); // PayPal передає свій ID замовлення як 'token'
      const payerId = urlParams.get("PayerID");

      const titleEl = document.getElementById("status-title");
      const textEl = document.getElementById("status-text");
      const loaderEl = document.getElementById("loader");

      if (paypalOrderId) {
        console.log("📌 Підтверджуємо платіж у PayPal:", { paypalOrderId, payerId });

        // Захоплення платежу - саме зараз замовлення вперше потрапить у БД
        fetch("/api/payment/paypal/capture", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            paypalOrderId: paypalOrderId,
            payerId: payerId,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            console.log("✅ Відповідь бекенду:", data);

            if (data.success) {
              titleEl.innerText = "🎉 Оплата успішна!";
              titleEl.style.color = "#00ff66";
              textEl.innerText = `Твоє замовлення №${data.orderId} успішно оплачене. Зараз перенаправимо тебе в профіль...`;
              loaderEl.style.display = "none";
              document.getElementById("profile-link").style.display = "inline-block";

              // Повертаємо користувача в профіль абонента
              setTimeout(() => {
                window.location.href = "profile.html";
              }, 3000);
            } else {
              titleEl.innerText = "❌ Помилка платежу";
              titleEl.style.color = "#ff3333";
              textEl.innerText = "Не вдалося підтвердити платіж: " + data.error;
              loaderEl.style.display = "none";
            }
          })
          .catch((err) => {
            console.error("🔥 Помилка мережі під час запиту до бекенду:", err);
            titleEl.innerText = "❌ Помилка мережі";
            textEl.innerText = "Не вдалося зв'язатися з бекенд-сервером.";
            loaderEl.style.display = "none";
          });
      } else {
        console.error("❌ В URL-адресі посилання не вистачає токена PayPal!");
        titleEl.innerText = "⚠️ Помилка замовлення";
        textEl.innerText = "Токен PayPal відсутній у посиланні.";
        loaderEl.style.display = "none";
      }
    </script>
  </body>
</html>
